<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签约存证 - 链信租房</title>
    <link rel="stylesheet" href="css/app.css">
    <script src="vue.js"></script>
    <script src="vue-resource.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a class="brand" href="index.html">链信租房<span>Blockchain Rental</span></a>
        <nav class="nav-links" id="site-nav"></nav>
    </div>
</header>

<div id="app" class="page" :class="{loading: loading}">
    <div v-html="stepsHtml"></div>

    <div class="card">
        <h1>租赁合同上链存证</h1>
        <p class="subtitle">上传合同文件，系统将计算 SHA256 摘要并写入区块链，文件名（不含扩展名）作为合同编号</p>

        <div v-if="flow.houseId" class="alert alert-info">
            已认证房产：{{ flow.houseId }} · 租户：{{ flow.name || '—' }}
        </div>

        <div class="upload-area">
            <p>支持 PDF / JPG，文件名示例：<strong>HT2026001.pdf</strong></p>
            <input type="file" @change="onSelect" accept="image/jpeg,application/pdf">
        </div>

        <button class="btn btn-primary btn-block" @click="upload" :disabled="!file">上传并存证</button>

        <div class="flow-actions" style="margin-top:16px">
            <a :href="prevUrl" class="btn btn-outline">← 返回上一步</a>
            <span class="spacer"></span>
            <a href="index.html" class="btn btn-secondary">完成，返回首页</a>
        </div>

        <div v-if="message" class="alert" :class="'alert-' + messageType">{{ message }}</div>
    </div>

    <div class="card">
        <h1>查询合同存证</h1>
        <p class="subtitle">输入合同编号，查询链上存储的哈希值</p>

        <div class="form-group">
            <label>合同编号</label>
            <input type="text" v-model="contractId" placeholder="与上传文件名一致，如 HT2026001">
        </div>
        <button class="btn btn-primary" @click="query" :disabled="!contractId">查询</button>

        <div v-if="hash" class="alert alert-success" style="word-break:break-all">
            链上哈希：{{ hash }}
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        stepsHtml: HKZF.renderSteps(3),
        flow: HKZF.getFlow(),
        formData: null,
        file: null,
        contractId: '',
        hash: '',
        loading: false,
        message: '',
        messageType: 'info',
        prevUrl: HKZF.prevStep(3)
    },
    methods: {
        onSelect: function (e) {
            if (!e.target.files.length) return;
            this.file = e.target.files[0];
            this.formData = new FormData();
            this.formData.append('contract', this.file);
            var name = this.file.name.replace(/\.[^.]+$/, '');
            this.contractId = name;
        },
        upload: function () {
            var self = this;
            if (!self.formData) return;
            self.loading = true;
            self.message = '';

            HKZF.apiPostForm(self, '/api/contract', self.formData).then(
                function (res) {
                    self.loading = false;
                    self.message = '合同已成功上链存证';
                    self.messageType = 'success';
                    self.hash = (res.body || '').toString();
                    HKZF.saveFlow({ contractDone: true, contractId: self.contractId });
                    self.stepsHtml = HKZF.renderSteps(3);
                },
                function (err) {
                    self.loading = false;
                    HKZF.handleError(self, err);
                }
            );
        },
        query: function () {
            var self = this;
            self.loading = true;
            self.hash = '';
            self.message = '';

            HKZF.apiGet(self, '/api/contract', { contractId: self.contractId }).then(
                function (res) {
                    self.loading = false;
                    self.hash = (res.body || '').toString();
                    if (!self.hash) {
                        self.message = '链上未找到该合同';
                        self.messageType = 'warning';
                    }
                },
                function (err) {
                    self.loading = false;
                    HKZF.handleError(self, err);
                }
            );
        }
    }
});
</script>
</body>
</html>
