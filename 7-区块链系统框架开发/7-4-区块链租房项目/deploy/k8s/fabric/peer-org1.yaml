apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer0-org1
  namespace: fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peer0-org1
  template:
    metadata:
      labels:
        app: peer0-org1
    spec:
      containers:
        - name: peer
          image: hyperledger/fabric-peer:2.5.12
          ports:
            - containerPort: 7051
          env:
            - name: FABRIC_LOGGING_SPEC
              value: INFO
            - name: CORE_PEER_TLS_ENABLED
              value: "true"
            - name: CORE_PEER_ID
              value: peer0.org1.example.com
            - name: CORE_PEER_ADDRESS
              value: peer0-org1:7051
            - name: CORE_PEER_LISTENADDRESS
              value: "0.0.0.0:7051"
            - name: CORE_PEER_CHAINCODEADDRESS
              value: peer0-org1:7052
            - name: CORE_PEER_CHAINCODELISTENADDRESS
              value: "0.0.0.0:7052"
            - name: CORE_PEER_GOSSIP_BOOTSTRAP
              value: peer0.org1.example.com:7051
            - name: CORE_PEER_GOSSIP_EXTERNALENDPOINT
              value: peer0.org1.example.com:7051
            - name: CORE_PEER_LOCALMSPID
              value: Org1MSP
            - name: CORE_PEER_FILESYSTEMPATH
              value: /fabric/peer-ledgers/peer0-org1
            - name: CORE_PEER_MSPCONFIGPATH
              value: /fabric/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp
            - name: CORE_PEER_TLS_ROOTCERT_FILE
              value: /fabric/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt
            - name: CORE_PEER_TLS_CERT_FILE
              value: /fabric/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/server.crt
            - name: CORE_PEER_TLS_KEY_FILE
              value: /fabric/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/server.key
          volumeMounts:
            - name: fabric-data
              mountPath: /fabric
      volumes:
        - name: fabric-data
          persistentVolumeClaim:
            claimName: fabric-data
---
apiVersion: v1
kind: Service
metadata:
  name: peer0-org1
  namespace: fabric
spec:
  selector:
    app: peer0-org1
  ports:
    - name: grpc
      port: 7051
      targetPort: 7051
