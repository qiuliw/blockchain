apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer0-org2
  namespace: fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peer0-org2
  template:
    metadata:
      labels:
        app: peer0-org2
    spec:
      containers:
        - name: peer
          image: hyperledger/fabric-peer:2.5.12
          ports:
            - containerPort: 9051
          env:
            - name: FABRIC_LOGGING_SPEC
              value: INFO
            - name: CORE_PEER_TLS_ENABLED
              value: "true"
            - name: CORE_PEER_ID
              value: peer0.org2.example.com
            - name: CORE_PEER_ADDRESS
              value: peer0-org2:9051
            - name: CORE_PEER_LISTENADDRESS
              value: "0.0.0.0:9051"
            - name: CORE_PEER_CHAINCODEADDRESS
              value: peer0-org2:9052
            - name: CORE_PEER_CHAINCODELISTENADDRESS
              value: "0.0.0.0:9052"
            - name: CORE_PEER_GOSSIP_BOOTSTRAP
              value: peer0.org2.example.com:9051
            - name: CORE_PEER_GOSSIP_EXTERNALENDPOINT
              value: peer0.org2.example.com:9051
            - name: CORE_PEER_LOCALMSPID
              value: Org2MSP
            - name: CORE_PEER_FILESYSTEMPATH
              value: /fabric/peer-ledgers/peer0-org2
            - name: CORE_PEER_MSPCONFIGPATH
              value: /fabric/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/msp
            - name: CORE_PEER_TLS_ROOTCERT_FILE
              value: /fabric/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt
            - name: CORE_PEER_TLS_CERT_FILE
              value: /fabric/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/server.crt
            - name: CORE_PEER_TLS_KEY_FILE
              value: /fabric/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/server.key
          volumeMounts:
            - name: fabric-data
              mountPath: /fabric
      volumes:
        - name: fabric-data
          persistentVolumeClaim:
            claimName: fabric-data
---
apiVersion: v1
kind: Service
metadata:
  name: peer0-org2
  namespace: fabric
spec:
  selector:
    app: peer0-org2
  ports:
    - name: grpc
      port: 9051
      targetPort: 9051
