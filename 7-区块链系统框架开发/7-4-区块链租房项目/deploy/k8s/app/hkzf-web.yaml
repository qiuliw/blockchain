apiVersion: apps/v1
kind: Deployment
metadata:
  name: hkzf-web
  namespace: hkzf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hkzf-web
  template:
    metadata:
      labels:
        app: hkzf-web
    spec:
      containers:
        - name: hkzf-web
          image: hkzf-web:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hkzf-web
  namespace: hkzf
spec:
  type: NodePort
  selector:
    app: hkzf-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30888
