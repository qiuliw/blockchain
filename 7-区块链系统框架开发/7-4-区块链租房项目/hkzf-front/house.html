<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房产认证 - 链信租房</title>
    <link rel="stylesheet" href="css/app.css">
    <script src="vue.js"></script>
    <script src="vue-resource.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a class="brand" href="index.html">链信租房<span>Blockchain Rental</span></a>
        <nav class="nav-links" id="site-nav"></nav>
    </div>
</header>

<div id="app" class="page" :class="{loading: loading}">
    <div v-html="rentalPanelHtml"></div>
    <div v-html="stepsHtml"></div>

    <div class="card">
        <h1>第 2 步 · 房产认证</h1>
        <p class="subtitle">租赁申请 {{ flow.rentalId }} · 验证房源产权与出租资格</p>

        <div class="alert alert-info" v-if="flow.name">
            已认证租客：{{ flow.name }}（{{ HKZF.maskId(flow.id) }}）
        </div>

        <div class="form-group">
            <label>房产证号</label>
            <input type="text" v-model="houseId" placeholder="请输入房产证编号">
        </div>
        <div class="form-group">
            <label>持有人身份证号</label>
            <input type="text" v-model="id" placeholder="须与身份认证一致" maxlength="18">
        </div>

        <div class="flow-actions">
            <button class="btn btn-primary" @click="check" :disabled="!houseId || !id">提交认证</button>
        </div>

        <div class="flow-actions" style="margin-top:12px">
            <a :href="prevUrl" class="btn btn-outline">← 返回身份认证</a>
            <span class="spacer"></span>
            <a v-if="flow.houseDone" href="contract.html" class="btn btn-secondary">下一步：签约存证 →</a>
            <span v-else class="btn btn-secondary btn-disabled">下一步：签约存证 →</span>
        </div>

        <div v-if="message" class="alert" :class="'alert-' + messageType">{{ message }}</div>

        <div v-if="result" class="result-grid">
            <div class="result-item">
                <div class="label">产权人匹配</div>
                <div class="value" :class="result.first ? 'ok' : 'no'">{{ HKZF.boolLabel(result.first, '匹配', '不匹配') }}</div>
            </div>
            <div class="result-item">
                <div class="label">可出租</div>
                <div class="value" :class="result.second ? 'ok' : 'no'">{{ HKZF.boolLabel(result.second, '是', '否') }}</div>
            </div>
        </div>
    </div>
</div>

<script>
if (!HKZF.guardStep(2)) {
  // redirecting
} else {
  var flow = HKZF.getFlow();
  new Vue({
    el: '#app',
    data: {
        flow: flow,
        stepsHtml: HKZF.renderSteps(2),
        rentalPanelHtml: HKZF.renderRentalPanel(),
        houseId: flow.houseId || '1111112222223333333000000000',
        id: flow.id || '',
        loading: false,
        message: '',
        messageType: 'info',
        result: null,
        prevUrl: HKZF.prevStep(2),
        HKZF: HKZF
    },
    methods: {
        refresh: function () {
            this.flow = HKZF.getFlow();
            this.stepsHtml = HKZF.renderSteps(2);
            this.rentalPanelHtml = HKZF.renderRentalPanel();
        },
        check: function () {
            var self = this;
            if (self.id !== self.flow.id) {
                self.message = '持有人身份证须与第 1 步身份认证一致';
                self.messageType = 'warning';
                return;
            }
            self.loading = true;
            self.message = '';
            self.result = null;

            HKZF.apiGet(self, '/api/house', { houseId: self.houseId, id: self.id }).then(
                function (res) {
                    self.loading = false;
                    self.result = HKZF.parsePair(res.body);
                    if (self.result.first && self.result.second) {
                        self.message = '房产认证通过，请继续签约存证';
                        self.messageType = 'success';
                        HKZF.saveFlow({
                            houseDone: true,
                            houseId: self.houseId,
                            contractDone: false,
                            contractId: '',
                            contractHash: ''
                        });
                        self.refresh();
                    } else if (!self.result.first) {
                        HKZF.saveFlow({ houseDone: false, contractDone: false });
                        self.message = '产权人与身份证不匹配，或链上无该房产记录';
                        self.messageType = 'warning';
                        self.refresh();
                    } else {
                        HKZF.saveFlow({ houseDone: false, contractDone: false });
                        self.message = '该房产暂不具备出租资格';
                        self.messageType = 'error';
                        self.refresh();
                    }
                },
                function (err) {
                    self.loading = false;
                    HKZF.handleError(self, err);
                }
            );
        }
    }
  });
}
</script>
</body>
</html>
